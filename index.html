function useCollection(name) {
  const [data, setData] = useState([]);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = fdb.collection(name).onSnapshot(snap => {
      setData(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setReady(true);
    }, err => { console.error("Firestore (" + name + "):", err); setReady(true); });
    return unsub;
  }, []);
  return [data, ready];
}

function getLocation(timeout) {
  timeout = timeout || 8000;
  return new Promise(function (resolve) {
    if (!navigator.geolocation) { resolve(null); return; }
    var done = false;
    function finish(loc) { if (!done) { done = true; resolve(loc); } }
    var t = setTimeout(function () { finish(null); }, timeout);
    navigator.geolocation.getCurrentPosition(
      function (pos) { clearTimeout(t); finish({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }); },
      function () {
        // GPS de precisão falhou/demorou: tenta localização mais rápida (rede/wifi)
        navigator.geolocation.getCurrentPosition(
          function (pos) { clearTimeout(t); finish({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }); },
          function () { clearTimeout(t); finish(null); },
          { enableHighAccuracy: false, timeout: timeout, maximumAge: 60000 }
        );
      },
      { enableHighAccuracy: true, timeout: Math.floor(timeout / 2), maximumAge: 10000 }
    );
  });
}
function compressImage(file, maxDim, quality) {
  return new Promise(function (resolve, reject) {
    const reader = new FileReader();
    reader.onload = function () {
      const img = new Image();
      img.onload = function () {
        let w = img.width, hgt = img.height;
        if (w > hgt) { if (w > maxDim) { hgt = Math.round(hgt * maxDim / w); w = maxDim; } }
        else { if (hgt > maxDim) { w = Math.round(w * maxDim / hgt); hgt = maxDim; } }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = hgt;
        canvas.getContext("2d").drawImage(img, 0, 0, w, hgt);
        try { resolve(canvas.toDataURL("image/jpeg", quality)); } catch (e) { reject(e); }
      };
      img.onerror = function () { reject(new Error("imagem inválida")); };
      img.src = reader.result;
    };
    reader.onerror = function () { reject(new Error("leitura falhou")); };
    reader.readAsDataURL(file);
  });
}

function QRImage({ data, size = 180 }) {
  const [status, setStatus] = useState("loading");
  const [attempt, setAttempt] = useState(0);
  const url = "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size + "&data=" + encodeURIComponent(data) + "&_r=" + attempt;
  if (status === "error") return h("div", { style: { width: size, height: size, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8, background: "#fff", borderRadius: 8 } },
    h(Icon, { name: "alert", size: 22, color: "#dc2626" }),

  );
  return h("img", { src: url, alt: "QR", width: size, height: size, style: { width: size, height: size, display: status === "loading" ? "none" : "block" }, onLoad: () => setStatus("ok"), onError: () => setStatus("error") });

function App() {
  const [user, setUser] = useState(null);
  const [activeTenant, setActiveTenant] = useState(null);
  const [users, usersReady] = useCollection("users");
  const [points] = useCollection("points");
  const [routes] = useCollection("routes");
  const [records] = useCollection("records");

  useEffect(() => {
    if (usersReady && users.length === 0) {
      setItem("users", "admin-seed", { name: "Administrador", username: "admin", password: "admin123", role: "admin", tenantId: "admin-seed", active: true, createdAt: new Date().toISOString() }).catch(() => {});
    }
  }, [usersReady, users.length]);

  if (!usersReady) return h("div", { style: { minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center" } },
    h("div", { style: { textAlign: "center" } },
      h("div", { style: { width: 72, height: 72, borderRadius: "50%", background: "linear-gradient(135deg,#1e6fff,#00b4ff)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", boxShadow: "0 0 40px rgba(30,111,255,0.5)" } }, h(Icon, { name: "shield", size: 36, color: "#fff" })),
      h("div", { style: { color: "#fff", fontWeight: 900, fontSize: 24, letterSpacing: 8 } }, "A.H.S"),
      h("div", { style: { color: "#1e6fff", fontSize: 10, letterSpacing: 4, marginTop: 4 } }, "CONECTANDO...")
    )
  );

  if (!user) return h(Login, { users, onLogin: setUser });

  // ── Isolamento por administrador + Admin-mestre ──
  // Cada admin é "dono" do próprio painel (tenantId = id do admin).
  // Colaboradores herdam o tenantId do admin que os criou.
  // O admin-mestre (o 1º administrador, o mais antigo) enxerga e acessa TODOS os painéis.
  const tOf = (x) => x.tenantId || "admin-seed";
  const adminList = users.filter(u => u.role === "admin");
  let masterId = null;
  adminList.forEach(a => { if (a.master === true) masterId = a.id; });
  if (!masterId) {
    let bestT = Infinity;
    adminList.forEach(a => { const t = a.createdAt ? new Date(a.createdAt).getTime() : 0; if (t < bestT) { bestT = t; masterId = a.id; } });
    if (!masterId) masterId = "admin-seed";
  }
  const isMaster = user.role === "admin" && user.id === masterId;
  const ownTenant = user.role === "admin" ? user.id : (user.tenantId || "admin-seed");
  const viewTenant = isMaster ? (activeTenant || ownTenant) : ownTenant;

  const fUsers = users.filter(u => tOf(u) === viewTenant);
  const fPoints = points.filter(p => tOf(p) === viewTenant);
  const fRoutes = routes.filter(r => tOf(r) === viewTenant);
  const fRecords = records.filter(r => tOf(r) === viewTenant);

  if (user.role === "admin") return h(Admin, { currentUser: user, isMaster, ownTenant, viewTenant, activeTenant, setActiveTenant, admins: adminList, users: fUsers, allUsers: users, myTenant: viewTenant, points: fPoints, routes: fRoutes, records: fRecords, onLogout: () => { setActiveTenant(null); setUser(null); } });
  return h(Patrol, { currentUser: user, myTenant: viewTenant, routes: fRoutes, points: fPoints, records: fRecords, onLogout: () => setUser(null) });
}

      h("button", { onClick: login, style: { width: "100%", background: "linear-gradient(135deg,#1e6fff,#00b4ff)", border: "none", borderRadius: 14, padding: 16, color: "#fff", fontWeight: 900, fontSize: 16, cursor: "pointer", boxShadow: "0 4px 24px rgba(30,111,255,0.4)" } }, "ENTRAR")

function PScanner({ patrol, setPatrol, points, currentUser, setTab }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const coolRef = useRef(0);
  const patrolRef = useRef(patrol);
  const fileRef = useRef(null);
  const [cam, setCam] = useState(false);
  const [lastScan, setLastScan] = useState(null);
  const [scanErr, setScanErr] = useState("");
  const [manual, setManual] = useState("");
  const [showM, setShowM] = useState(false);
  const [pending, setPending] = useState(null);
  const [photo, setPhoto] = useState(null);
  const [busy, setBusy] = useState(false);

  useEffect(() => { patrolRef.current = patrol; }, [patrol]);
  useEffect(() => () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); }, []);

  const processQR = async (code) => {
    const p = patrolRef.current; if (!p) return;
    setScanErr("");
    if (pending) return;
    if (!code.startsWith("AHS_POINT_")) { setScanErr("QR Code inválido"); return; }
    const pid = code.replace("AHS_POINT_", "");
    const scanned = (p.scans || []).map(s => s.pointId);
    if (scanned.includes(pid)) { setScanErr("Ponto já registrado"); return; }
    if (!(p.route && p.route.pointIds && p.route.pointIds.includes(pid))) { setScanErr("Ponto não pertence a esta ronda"); return; }
    const pt = points.find(x => x.id === pid); if (!pt) { setScanErr("Ponto não encontrado"); return; }
    // QR válido: pede a foto do local ANTES de registrar o ponto
    stopCam();
    setPhoto(null);
    setPending({ pid: pid, pointName: pt.name });
  };

  const onPhoto = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setScanErr("");
    try {
      const data = await compressImage(file, 600, 0.45);
      setPhoto(data);
    } catch (err) { setScanErr("Não foi possível processar a foto. Tente novamente."); }
  };

  const confirmScan = async () => {
    const p = patrolRef.current;
    if (!p || !pending || !photo || busy) return;
    setBusy(true);
    const pid = pending.pid;
    const scan = { pointId: pid, pointName: pending.pointName, scannedAt: new Date().toISOString(), lat: null, lng: null, photo: photo };
    const newScans = [...(p.scans || []), scan];
    patrolRef.current = { ...p, scans: newScans };
    setPatrol(prev => ({ ...prev, scans: newScans }));
    try {
      await updateItem("records", p.id, { scans: newScans });
      setLastScan(pending.pointName); setTimeout(() => setLastScan(null), 3000);
      setPending(null); setPhoto(null);
      // captura a localização em segundo plano, sem travar a confirmação
      getLocation().then(function (loc) {
        if (!loc) return;
        const current = patrolRef.current; if (!current) return;
        const withLoc = (current.scans || []).map(s => (s.pointId === pid && s.scannedAt === scan.scannedAt) ? { ...s, lat: loc.lat, lng: loc.lng } : s);
        patrolRef.current = { ...current, scans: withLoc };
        setPatrol(prev => prev ? { ...prev, scans: withLoc } : prev);
        updateItem("records", p.id, { scans: withLoc }).catch(function () {});
      });
    } catch (err) {
      // desfaz o registro local em caso de erro ao salvar
      patrolRef.current = { ...p, scans: (p.scans || []) };
      setPatrol(prev => ({ ...prev, scans: (p.scans || []) }));
      setScanErr("Erro ao salvar o ponto. A foto pode estar muito grande — tente refazer a foto.");
    }
    setBusy(false);
  };

  const cancelPending = () => { setPending(null); setPhoto(null); setScanErr(""); };

  const startCam = async () => {
    setScanErr("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } } });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
      setCam(true);
      if ("BarcodeDetector" in window) {
        const det = new window.BarcodeDetector({ formats: ["qr_code"] });
        const loop = async () => {
          if (!streamRef.current) return;
          const now = Date.now();
          if (now - coolRef.current > 2000) {
            try { const codes = await det.detect(videoRef.current); if (codes.length) { coolRef.current = now; await processQR(codes[0].rawValue); } } catch (e) {}
          }
          rafRef.current = requestAnimationFrame(loop);
        };
        rafRef.current = requestAnimationFrame(loop);
      } else { setScanErr("Detecção automática indisponível neste navegador. Use o campo manual."); setShowM(true); }
    } catch (e) { setScanErr("Câmera indisponível (" + (e.message || "erro") + "). Use o campo manual."); setShowM(true); }
  };

  const stopCam = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setCam(false);
  };

  const finish = async () => {
    stopCam();
    const p = patrolRef.current; if (!p) return;
    const status = (p.scans || []).length >= p.totalPoints && p.totalPoints > 0 ? "completed" : "incomplete";
    await updateItem("records", p.id, { scans: p.scans || [], status, endTime: new Date().toISOString() });
    setPatrol(null); setTab("home");
  };

  if (!patrol) return h("div", { style: { padding: 16, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 400 } },
    h(Icon, { name: "alert", size: 40, color: "#ffb300", style: { marginBottom: 12 } }),
    h("div", { style: { color: "#fff", fontWeight: 700, fontSize: 16, marginBottom: 4 } }, "Nenhuma ronda ativa"),
    h("div", { style: { color: C.muted, fontSize: 13, marginBottom: 20 } }, "Inicie uma ronda na tela inicial"),
    h(Btn, { onClick: () => setTab("home") }, "Ir para Início")
  );

  const scannedIds = (patrol.scans || []).map(s => s.pointId);
  const rPts = ((patrol.route && patrol.route.pointIds) || []).map(id => points.find(p => p.id === id)).filter(Boolean);
  const allDone = rPts.length > 0 && rPts.every(p => scannedIds.includes(p.id));

  return h("div", { style: { padding: 16 } },
    h(Card, { style: { padding: 14, marginBottom: 12 } },
      h("div", { style: { color: C.muted, fontSize: 10, letterSpacing: 2, textTransform: "uppercase" } }, "Ronda Ativa"),
      h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 17, marginTop: 2 } }, patrol.routeName),
      h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginTop: 8 } },
        h("div", { style: { flex: 1, background: C.bg, borderRadius: 4, height: 6, overflow: "hidden" } }, h("div", { style: { height: "100%", borderRadius: 4, background: allDone ? "#00d68f" : "#1e6fff", width: (rPts.length > 0 ? (scannedIds.length / rPts.length) * 100 : 0) + "%", transition: "width 0.4s" } })),
        h("span", { style: { color: C.muted, fontSize: 11 } }, scannedIds.length + "/" + rPts.length)
      )
    ),
    h("input", { ref: fileRef, type: "file", accept: "image/*", capture: "environment", onChange: onPhoto, style: { display: "none" } }),
    pending && h(Card, { style: { overflow: "hidden", marginBottom: 12, padding: 16 } },
      h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 16, marginBottom: 2 } }, "Foto do local"),
      h("div", { style: { color: "#94a3b8", fontSize: 13, marginBottom: 14 } }, "Ponto: " + pending.pointName),
      !photo && h(React.Fragment, null,
        h("div", { style: { border: "1px dashed " + C.border, borderRadius: 12, padding: 28, textAlign: "center", marginBottom: 14 } },
          h(Icon, { name: "camera", size: 36, color: "#334155", style: { margin: "0 auto 10px" } }),
          h("div", { style: { color: C.muted, fontSize: 12 } }, "Tire uma foto do local para confirmar o ponto")
        ),
        h("div", { style: { display: "flex", gap: 10 } },
          h(Btn, { onClick: cancelPending, color: "#1e293b", style: { flex: 1 } }, "Cancelar"),
          h(Btn, { onClick: () => fileRef.current && fileRef.current.click(), style: { flex: 2, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 } }, h(Icon, { name: "camera", size: 16 }), "Tirar foto")
        )
      ),
      photo && h(React.Fragment, null,
        h("img", { src: photo, alt: "Foto do local", style: { width: "100%", borderRadius: 12, marginBottom: 14, display: "block", maxHeight: 320, objectFit: "cover" } }),
        h("div", { style: { display: "flex", gap: 10 } },
          h(Btn, { onClick: () => fileRef.current && fileRef.current.click(), color: "#1e293b", style: { flex: 1 } }, "Refazer"),
          h(Btn, { onClick: confirmScan, disabled: busy, color: "#166534", style: { flex: 2, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 } }, h(Icon, { name: "check", size: 16 }), busy ? "Salvando..." : "Confirmar ponto")
        )
      )
    ),
    !pending && h(Card, { style: { overflow: "hidden", marginBottom: 12 } },
      h("div", { style: { position: "relative", display: cam ? "block" : "none" } },
        h("video", { ref: videoRef, autoPlay: true, playsInline: true, muted: true, style: { width: "100%", height: 220, objectFit: "cover", display: "block", background: "#000" } }),
        h("div", { style: { position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" } },
          h("div", { style: { width: 180, height: 180, border: "2px solid rgba(30,111,255,0.7)", borderRadius: 14 } })
        ),
        h("div", { style: { position: "absolute", bottom: 8, left: "50%", transform: "translateX(-50%)", background: "rgba(30,111,255,0.15)", border: "1px solid rgba(30,111,255,0.3)", borderRadius: 20, padding: "4px 12px", color: "#60a5fa", fontSize: 11 } }, "Aponte para o QR Code"),
        h("button", { onClick: stopCam, style: { position: "absolute", top: 8, right: 8, background: "rgba(0,0,0,0.6)", border: "none", borderRadius: "50%", width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#fff" } }, h(Icon, { name: "x", size: 16 }))
      ),
      !cam && h("div", { style: { padding: 32, textAlign: "center" } },
        h(Icon, { name: "camera", size: 40, color: "#334155", style: { margin: "0 auto 12px" } }),
        h("div", { style: { color: C.muted, fontSize: 12, marginBottom: 16 } }, "Aponte a câmera para o QR Code do ponto"),
        h(Btn, { onClick: startCam, style: { padding: "12px 32px" } }, "Abrir Câmera")
      )
    ),
    lastScan && h("div", { style: { background: "rgba(0,214,143,0.08)", border: "1px solid rgba(0,214,143,0.3)", borderRadius: 12, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, marginBottom: 10 } },
      h(Icon, { name: "checkcircle", size: 18, color: "#00d68f" }),
      h("div", null, h("div", { style: { color: "#00d68f", fontWeight: 700, fontSize: 13 } }, "Ponto registrado!"), h("div", { style: { color: "#6ee7b7", fontSize: 11 } }, lastScan))
    ),
    scanErr && h("div", { style: { background: "rgba(255,61,113,0.08)", border: "1px solid rgba(255,61,113,0.3)", borderRadius: 12, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, marginBottom: 10 } },
      h(Icon, { name: "alert", size: 16, color: "#ff3d71" }), h("div", { style: { color: "#fca5a5", fontSize: 13 } }, scanErr)
    ),
    h("button", { onClick: () => setShowM(v => !v), style: { background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 12, display: "flex", alignItems: "center", gap: 6, marginBottom: 8 } }, h(Icon, { name: "alignleft", size: 14 }), showM ? "Ocultar entrada manual" : "Usar código manual"),
    showM && h("div", { style: { display: "flex", gap: 8, marginBottom: 12 } },
      h("input", { value: manual, onChange: e => setManual(e.target.value), placeholder: "Cole o código do QR aqui", style: { flex: 1, background: C.card, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 14px", color: "#fff", fontSize: 13, outline: "none" } }),
      h(Btn, { onClick: async () => { await processQR(manual.trim()); setManual(""); }, style: { padding: "10px 16px" } }, "OK")
    ),
    h("div", { style: { color: C.muted, fontSize: 10, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 } }, "Pontos da Ronda"),
    h("div", { style: { display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 } },
      rPts.map(pt => {
        const done = scannedIds.includes(pt.id);
        const sc = (patrol.scans || []).find(s => s.pointId === pt.id);
        return h("div", { key: pt.id, style: { background: done ? "rgba(0,214,143,0.06)" : C.card, border: "1px solid " + (done ? "rgba(0,214,143,0.25)" : C.border), borderRadius: 12, padding: "10px 14px", display: "flex", alignItems: "center", gap: 10 } },
          h("div", { style: { width: 26, height: 26, borderRadius: "50%", background: done ? "#00d68f" : "#1e293b", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 } }, done ? h(Icon, { name: "check", size: 13, color: "#fff" }) : h("span", { style: { color: "#475569", fontSize: 14 } }, "○")),
          h("div", { style: { flex: 1 } }, h("div", { style: { color: done ? "#00d68f" : "#fff", fontSize: 13, fontWeight: 600 } }, pt.name), sc && h("div", { style: { color: "#6ee7b7", fontSize: 11 } }, fmt.time(sc.scannedAt)))
        );
      })
    ),
    h("button", { onClick: finish, style: { width: "100%", background: allDone ? "#166534" : "#7f1d1d", border: "1px solid " + (allDone ? "#15803d" : "#991b1b"), borderRadius: 14, padding: 16, color: "#fff", fontWeight: 900, fontSize: 16, cursor: "pointer" } }, allDone ? "✓ FINALIZAR RONDA" : "✗ ENCERRAR INCOMPLETO")
  );
}

function PHistory({ records }) {
  return h("div", { style: { padding: 16 } },
    h("div", { style: { color: "#fff", fontWeight: 800, fontSize: 20, marginBottom: 16 } }, "Meu Histórico"),
    records.length === 0
      ? h(Card, { style: { padding: 40, textAlign: "center" } }, h(Icon, { name: "clock", size: 36, color: C.border, style: { margin: "0 auto 10px" } }), h("div", { style: { color: C.muted } }, "Nenhuma ronda realizada"))
      : h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
          records.slice().sort((a, b) => new Date(b.startTime) - new Date(a.startTime)).map(r => h(Card, { key: r.id, style: { padding: 14 } },
            h("div", { style: { display: "flex", alignItems: "flex-start", gap: 10 } },
              h("div", { style: { width: 8, height: 8, borderRadius: "50%", background: ST[r.status] ? ST[r.status].c : "#666", marginTop: 5, flexShrink: 0 } }),
              h("div", { style: { flex: 1 } },
                h("div", { style: { color: "#fff", fontWeight: 700 } }, r.routeName),
                h("div", { style: { color: C.muted, fontSize: 11, marginTop: 2 } }, fmt.dt(r.startTime) + " • " + (r.scans || []).length + "/" + r.totalPoints + " pts"),
                h("div", { style: { color: C.muted, fontSize: 11 } }, "Duração: " + fmt.dur(r.startTime, r.endTime))
              ),
              h("span", { style: { background: ST[r.status] ? ST[r.status].bg : "#333", color: ST[r.status] ? ST[r.status].c : "#fff", fontSize: 10, padding: "3px 8px", borderRadius: 20, fontWeight: 700, flexShrink: 0 } }, ST[r.status] ? ST[r.status].label : r.status)
            )
          ))
        )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>

<script>
  setTimeout(function() {
    var root = document.getElementById('root');
    if (root && root.children.length === 0) {
      showErr('NADA CARREGOU depois de 6 segundos. Possíveis causas: sem internet, ou algum dos scripts (React/Firebase) foi bloqueado. Verifique a conexão e tente recarregar a página.');
    }
  }, 6000);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
